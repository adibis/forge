name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            zig_host: linux-x86_64
            target: x86_64-linux-musl
            asset: forge-linux-x86_64
          - os: ubuntu-latest
            zig_host: linux-x86_64
            target: aarch64-linux-musl
            asset: forge-linux-aarch64
          - os: macos-latest
            zig_host: macos-aarch64
            target: aarch64-macos
            asset: forge-darwin-arm64
          - os: macos-latest
            zig_host: macos-aarch64
            target: x86_64-macos
            asset: forge-darwin-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        shell: bash
        run: |
          curl -fsSL "https://ziglang.org/download/0.16.0/zig-${{ matrix.zig_host }}-0.16.0.tar.xz" | tar -xJ
          echo "$PWD/zig-${{ matrix.zig_host }}-0.16.0" >> "$GITHUB_PATH"

      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: zig-out/bin/forge

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Rename artifacts
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            mv "$dir/forge" "artifacts/$name"
            rmdir "$dir"
          done
          ls -lh artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/forge-*
